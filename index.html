<!DOCTYPE html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      touch-action: manipulation;
    }

    video:not(.target3-video):not(.target4-video) {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      background: transparent !important;
      z-index: 0 !important;
    }

    a-scene {
      position: fixed;
      inset: 0;
      background: transparent !important;
      z-index: 1;
    }

    a-scene canvas,
    .a-canvas {
      background: transparent !important;
    }

    .photo-controls {
      position: fixed;
      right: max(18px, env(safe-area-inset-right));
      bottom: calc(22px + env(safe-area-inset-bottom));
      z-index: 20;
      pointer-events: none;
    }

    .capture-button {
      position: relative;
      width: 72px;
      height: 72px;
      padding: 0;
      border: 2px solid rgba(255, 255, 255, 0.88);
      border-radius: 50%;
      background: #ffffff;
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.38),
        inset 0 0 0 5px rgba(255, 255, 255, 0.72),
        inset 0 0 0 9px rgba(5, 7, 10, 0.16);
      cursor: pointer;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
    }

    .capture-button::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 14px;
      width: 36px;
      height: 28px;
      border: 3px solid #0a0d13;
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.9);
      opacity: 0.95;
      display: none;
    }

    .capture-button::after {
      content: "";
      position: absolute;
      left: 29px;
      top: 20px;
      width: 14px;
      height: 14px;
      border: 3px solid #0a0d13;
      border-radius: 50%;
      background: transparent;
      display: none;
    }

    .capture-button:active {
      transform: scale(0.94);
    }

    .capture-button[disabled] {
      cursor: wait;
      opacity: 0.62;
    }

    @media (max-width: 520px) {
      .photo-controls {
        right: 50%;
        transform: translateX(50%);
      }
    }
  </style>
  <script>
    AFRAME.registerShader("chromakey", {
      schema: {
        src: { type: "map", is: "uniform" },
        keyColor: { type: "color", default: "#00ff00", is: "uniform" },
        similarity: { type: "number", default: 0.35, is: "uniform" },
        smoothness: { type: "number", default: 0.08, is: "uniform" },
        spill: { type: "number", default: 0.2, is: "uniform" }
      },
      vertexShader: `
        varying vec2 vUv;

        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform sampler2D src;
        uniform vec3 keyColor;
        uniform float similarity;
        uniform float smoothness;
        uniform float spill;
        varying vec2 vUv;

        void main() {
          vec4 videoColor = texture2D(src, vUv);
          float diff = distance(videoColor.rgb, keyColor);
          float alpha = smoothstep(similarity, similarity + smoothness, diff);
          float greenSpill = max(0.0, videoColor.g - max(videoColor.r, videoColor.b));
          vec3 color = videoColor.rgb;

          color.g -= greenSpill * spill * (1.0 - alpha);
          gl_FragColor = vec4(color, videoColor.a * alpha);

          if (gl_FragColor.a < 0.01) {
            discard;
          }
        }
      `
    });

    AFRAME.registerComponent("wander-video", {
      schema: {
        minX: { type: "number", default: -0.55 },
        maxX: { type: "number", default: 0.55 },
        minY: { type: "number", default: -0.34 },
        maxY: { type: "number", default: 0.30 },
        speed: { type: "number", default: 0.28 },
        turnInterval: { type: "number", default: 950 }
      },

      init() {
        this.velocity = new THREE.Vector2();
        this.elapsedSinceTurn = 0;
        this.baseScaleY = this.el.object3D.scale.y || 1;
        this.pickDirection();
      },

      tick(_time, delta) {
        const seconds = delta / 1000;
        const position = this.el.object3D.position;

        this.elapsedSinceTurn += delta;
        if (this.elapsedSinceTurn > this.data.turnInterval) {
          this.pickDirection();
        }

        position.x += this.velocity.x * seconds;
        position.y += this.velocity.y * seconds;

        if (position.x < this.data.minX || position.x > this.data.maxX) {
          position.x = THREE.MathUtils.clamp(position.x, this.data.minX, this.data.maxX);
          this.velocity.x *= -1;
          this.flipToDirection();
        }

        if (position.y < this.data.minY || position.y > this.data.maxY) {
          position.y = THREE.MathUtils.clamp(position.y, this.data.minY, this.data.maxY);
          this.velocity.y *= -1;
        }
      },

      pickDirection() {
        const angle = Math.random() * Math.PI * 2;
        this.velocity.set(
          Math.cos(angle) * this.data.speed,
          Math.sin(angle) * this.data.speed
        );
        this.elapsedSinceTurn = 0;
        this.flipToDirection();
      },

      flipToDirection() {
        const direction = this.velocity.x < 0 ? -1 : 1;
        this.el.object3D.scale.set(direction, this.baseScaleY, 1);
      }
    });

    AFRAME.registerComponent("click-to-link", {
      schema: {
        url: { type: "string", default: "" }
      },

      init() {
        this.el.addEventListener("click", () => {
          if (this.data.url) {
            window.location.assign(this.data.url);
          }
        });
      }
    });
  </script>

  <script>
    AFRAME.registerComponent("camera-facing", {
      init() {
        this.parentQuaternion = new THREE.Quaternion();
        this.inverseParentQuaternion = new THREE.Quaternion();
        this.desiredWorldQuaternion = new THREE.Quaternion();
        this.frontFacingQuaternion = new THREE.Quaternion();
        this.wrapperWorldPosition = new THREE.Vector3();
        this.cameraWorldPosition = new THREE.Vector3();
        this.lookAtMatrix = new THREE.Matrix4();
        this.up = new THREE.Vector3(0, 1, 0);
        this.camera = null;

        this.frontFacingQuaternion.setFromEuler(
          new THREE.Euler(0, Math.PI, 0)
        );
      },

      tick() {
        const parentObject = this.el.parentEl?.object3D;
        const cameraObject = this.camera || this.el.sceneEl.camera;

        if (!parentObject || !cameraObject) {
          return;
        }

        this.camera = cameraObject;

        parentObject.getWorldQuaternion(this.parentQuaternion);
        this.inverseParentQuaternion.copy(this.parentQuaternion).invert();

        this.el.object3D.getWorldPosition(this.wrapperWorldPosition);
        cameraObject.getWorldPosition(this.cameraWorldPosition);

        this.lookAtMatrix.lookAt(
          this.wrapperWorldPosition,
          this.cameraWorldPosition,
          this.up
        );
        this.desiredWorldQuaternion.setFromRotationMatrix(this.lookAtMatrix);
        this.desiredWorldQuaternion.multiply(this.frontFacingQuaternion);

        this.el.object3D.quaternion.copy(this.inverseParentQuaternion);
        this.el.object3D.quaternion.multiply(this.desiredWorldQuaternion);
      }
    });

    sceneEl?.addEventListener("loaded", ensureTransparentRenderer);
    sceneEl?.addEventListener("renderstart", ensureTransparentRenderer);
    sceneEl?.addEventListener("arReady", keepCameraFeedVisible);
    new MutationObserver(keepCameraFeedVisibleOnce).observe(document.body, {
      childList: true,
      subtree: true
    });

    loadImageSize(CHARACTER_IMAGE_SRC)
      .then(({ width, height }) => {
        const targetPhysicalWidthM =
          TARGET_PHYSICAL_HEIGHT_M * (TARGET_IMAGE_WIDTH_PX / TARGET_IMAGE_HEIGHT_PX);
        const anchorUnitsPerMeter = 1 / targetPhysicalWidthM;
        const characterAspectRatio = width / height;
        const characterPhysicalWidthM =
          CHARACTER_VISIBLE_HEIGHT_M * characterAspectRatio;

        const characterWidthUnits = characterPhysicalWidthM * anchorUnitsPerMeter;
        const characterHeightUnits = CHARACTER_VISIBLE_HEIGHT_M * anchorUnitsPerMeter;

        const targetCenterFromFloorM = DESK_HEIGHT_M + TARGET_PHYSICAL_HEIGHT_M / 2;
        const characterCenterFromFloorM =
          (CHARACTER_VISIBLE_HEIGHT_M / 2) + CHARACTER_VERTICAL_OFFSET_M;

        const positionXUnits = CHARACTER_RIGHT_GAP_M * anchorUnitsPerMeter;
        const positionYUnits =
          (characterCenterFromFloorM - targetCenterFromFloorM) * anchorUnitsPerMeter;
        const positionZUnits = CHARACTER_FORWARD_M * anchorUnitsPerMeter;

        characterBillboard.setAttribute(
          "position",
          `${positionXUnits.toFixed(3)} ${positionYUnits.toFixed(3)} ${positionZUnits.toFixed(3)}`
        );
        characterBillboard.setAttribute("camera-facing", "");

        characterPlane.setAttribute("src", CHARACTER_IMAGE_SRC);
        characterPlane.setAttribute("width", characterWidthUnits.toFixed(3));
        characterPlane.setAttribute("height", characterHeightUnits.toFixed(3));
        characterReady = true;
        updatePanelVisibility();
        characterPlane.setAttribute(
          "animation__float",
          [
            "property: position",
            "dir: alternate",
            "dur: 2200",
            "easing: easeInOutSine",
            "loop: true",
            `to: 0 ${(IDLE_FLOAT_M * anchorUnitsPerMeter).toFixed(3)} 0`
          ].join("; ")
        );
        characterPlane.setAttribute(
          "animation__sway",
          [
            "property: rotation",
            "dir: alternate",
            "dur: 3200",
            "easing: easeInOutSine",
            "loop: true",
            `to: 0 0 ${IDLE_SWAY_DEG}`
          ].join("; ")
        );
      })
      .catch((error) => {
        console.error("Failed to load character image size.", error);
      });

    function loadImageSize(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();

        image.addEventListener("load", () => {
          resolve({
            width: image.naturalWidth,
            height: image.naturalHeight
          });
        });
        image.addEventListener("error", reject);
        image.src = src;
      });
    }

    panelTarget.addEventListener("targetFound", () => {
      activeTargets.add("target0");
      schedulePanelReveal();
    });

    panelTarget.addEventListener("targetLost", () => {
      activeTargets.delete("target0");
      hidePanel();
    });

    priorityTargets.forEach((target) => {
      target.addEventListener("targetFound", () => {
        activeTargets.add(target.id);
        hidePanel();
      });

      target.addEventListener("targetLost", () => {
        activeTargets.delete(target.id);
        schedulePanelReveal();
      });
    });

    target3Target.addEventListener("targetFound", () => {
      target3Active = true;
      playTarget3Videos();
    });

    target3Target.addEventListener("targetLost", () => {
      target3Active = false;
      pauseTarget3Videos();
    });

    target4Target.addEventListener("targetFound", () => {
      target4Active = true;
      playVideo(target4Video);
    });

    target4Target.addEventListener("targetLost", () => {
      target4Active = false;
      target4Video.pause();
    });

    document.body.addEventListener("click", unlockArVideos, { once: true });
    document.body.addEventListener("touchstart", unlockArVideos, { once: true });

    function schedulePanelReveal() {
      window.clearTimeout(panelRevealTimer);
      panelStable = false;
      characterPlane.setAttribute("visible", "false");

      if (!activeTargets.has("target0") || hasPriorityTarget()) {
        return;
      }

      panelRevealTimer = window.setTimeout(() => {
        panelStable = true;
        updatePanelVisibility();
      }, PANEL_STABLE_DELAY_MS);
    }

    function updatePanelVisibility() {
      characterPlane.setAttribute(
        "visible",
        String(
          characterReady &&
          panelStable &&
          activeTargets.has("target0") &&
          !hasPriorityTarget()
        )
      );
    }

    function hidePanel() {
      window.clearTimeout(panelRevealTimer);
      panelStable = false;
      characterPlane.setAttribute("visible", "false");
    }

    function hasPriorityTarget() {
      return activeTargets.has("target1") || activeTargets.has("target2");
    }

    function playTarget3Videos() {
      target3Videos.forEach((video) => {
        playVideo(video);
      });
    }

    function pauseTarget3Videos() {
      target3Videos.forEach((video) => {
        video.pause();
      });
    }

    function unlockArVideos() {
      [...target3Videos, target4Video].forEach((video) => {
        video.muted = true;
        video.play()
          .then(() => {
            if (
              (video.classList.contains("target3-video") && !target3Active) ||
              (video === target4Video && !target4Active)
            ) {
              video.pause();
            }
          })
          .catch(() => {});
      });
    }

    function playVideo(video) {
      video.muted = true;
      video.play().catch(() => {});
    }

    setupPhotoCapture();

    function setupPhotoCapture() {
      const captureButton = document.getElementById("capture-button");

      if (!captureButton) {
        return;
      }

      captureButton.addEventListener("click", async () => {
        captureButton.disabled = true;

        try {
          const blob = captureArPhoto();
          const fileName = createPhotoFileName();
          const file = new File([blob], fileName, { type: "image/png" });

          await sharePhotoFile(file, fileName);
        } catch (error) {
          if (error.name !== "AbortError") {
            console.error("Failed to capture AR photo.", error);
          }
        } finally {
          captureButton.disabled = false;
        }
      });
    }

    function captureArPhoto() {
      const video = findCameraVideo();
      const arCanvas = findArCanvas();

      if (!video || !video.videoWidth || !video.videoHeight) {
        throw new Error("カメラ映像の準備がまだです");
      }

      if (!arCanvas) {
        throw new Error("AR表示の準備がまだです");
      }

      renderCurrentFrame();

      const outputSize = getCaptureSize(arCanvas);
      const outputCanvas = document.createElement("canvas");
      outputCanvas.width = outputSize.width;
      outputCanvas.height = outputSize.height;

      const context = outputCanvas.getContext("2d", {
        alpha: false,
        desynchronized: true
      });

      if (!context) {
        throw new Error("写真を書き出せませんでした");
      }

      context.fillStyle = "#05070a";
      context.fillRect(0, 0, outputCanvas.width, outputCanvas.height);
      drawCover(context, video, outputCanvas.width, outputCanvas.height);
      context.drawImage(arCanvas, 0, 0, outputCanvas.width, outputCanvas.height);

      return canvasToPngBlob(outputCanvas);
    }

    async function sharePhotoFile(file, fileName) {
      const sharePayload = {
        files: [file],
        title: "Holokle WebAR",
        text: "WebARで撮影した写真です。"
      };

      if (navigator.canShare?.({ files: [file] }) && navigator.share) {
        await navigator.share(sharePayload);
        return "shared";
      }

      downloadBlob(file, fileName);
      return "downloaded";
    }

    function findCameraVideo() {
      const videos = Array.from(document.querySelectorAll("video"));
      return (
        videos.find(isUsableCameraVideo) ||
        videos.find((video) => !isArAssetVideo(video) && video.videoWidth && video.videoHeight) ||
        null
      );
    }

    function isUsableCameraVideo(video) {
      return (
        !isArAssetVideo(video) &&
        video.readyState >= 2 &&
        video.videoWidth &&
        video.videoHeight
      );
    }

    function isArAssetVideo(video) {
      return (
        video.classList.contains("target3-video") ||
        video.classList.contains("target4-video") ||
        Boolean(video.closest("a-assets"))
      );
    }

    function findArCanvas() {
      return sceneEl?.renderer?.domElement || sceneEl?.canvas || document.querySelector("canvas");
    }

    function renderCurrentFrame() {
      if (!sceneEl?.renderer || !sceneEl?.object3D || !sceneEl?.camera) {
        return;
      }

      sceneEl.renderer.preserveDrawingBuffer = true;
      sceneEl.renderer.render(sceneEl.object3D, sceneEl.camera);
    }

    function getCaptureSize(arCanvas) {
      const rect = arCanvas.getBoundingClientRect();
      const cssWidth = Math.max(1, Math.round(rect.width || window.innerWidth || 720));
      const cssHeight = Math.max(1, Math.round(rect.height || window.innerHeight || 1280));
      const pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
      const maxSide = 2200;
      const rawWidth = Math.round(cssWidth * pixelRatio);
      const rawHeight = Math.round(cssHeight * pixelRatio);
      const scale = Math.min(1, maxSide / Math.max(rawWidth, rawHeight));

      return {
        width: Math.max(1, Math.round(rawWidth * scale)),
        height: Math.max(1, Math.round(rawHeight * scale))
      };
    }

    function drawCover(context, source, outputWidth, outputHeight) {
      const sourceWidth = source.videoWidth || source.width;
      const sourceHeight = source.videoHeight || source.height;
      const sourceRatio = sourceWidth / sourceHeight;
      const outputRatio = outputWidth / outputHeight;
      let cropX = 0;
      let cropY = 0;
      let cropWidth = sourceWidth;
      let cropHeight = sourceHeight;

      if (sourceRatio > outputRatio) {
        cropWidth = sourceHeight * outputRatio;
        cropX = (sourceWidth - cropWidth) / 2;
      } else {
        cropHeight = sourceWidth / outputRatio;
        cropY = (sourceHeight - cropHeight) / 2;
      }

      context.drawImage(
        source,
        cropX,
        cropY,
        cropWidth,
        cropHeight,
        0,
        0,
        outputWidth,
        outputHeight
      );
    }

    function canvasToPngBlob(canvas) {
      return dataUrlToBlob(canvas.toDataURL("image/png"));
    }

    function dataUrlToBlob(dataUrl) {
      const [header, base64] = dataUrl.split(",");
      const mimeMatch = header.match(/data:(.*?);base64/);
      const mime = mimeMatch?.[1] || "image/png";
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);

      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }

      return new Blob([bytes], { type: mime });
    }

    function downloadBlob(blob, fileName) {
      const objectUrl = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = objectUrl;
      link.download = fileName;
      link.rel = "noopener";
      document.body.appendChild(link);
      link.click();
      link.remove();

      window.setTimeout(() => {
        URL.revokeObjectURL(objectUrl);
      }, 1000);
    }

    function createPhotoFileName() {
      const stamp = new Date()
        .toISOString()
        .replaceAll(":", "")
        .replace(/\.\d{3}Z$/, "Z");
      return `holokle-webar-photo-${stamp}.png`;
    }

    function ensureTransparentRenderer() {
      if (!sceneEl?.renderer) {
        return;
      }

      sceneEl.renderer.setClearColor(0x000000, 0);
      sceneEl.renderer.setClearAlpha(0);
    }

    function keepCameraFeedVisible() {
      ensureTransparentRenderer();
      keepCameraFeedVisibleOnce();

      window.setTimeout(keepCameraFeedVisibleOnce, 300);
      window.setTimeout(keepCameraFeedVisibleOnce, 1000);
    }

    function keepCameraFeedVisibleOnce() {
      ensureTransparentRenderer();

      for (const video of document.querySelectorAll("video")) {
        if (isArAssetVideo(video)) {
          continue;
        }

        video.style.position = "fixed";
        video.style.inset = "0";
        video.style.width = "100vw";
        video.style.height = "100vh";
        video.style.objectFit = "cover";
        video.style.background = "transparent";
        video.style.zIndex = "0";
      }
    }
  </script>
</body>
</html>
