<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<body>

<a-scene
  mindar-image="imageTargetSrc: targets.mind; smoothing: true; filterMinCF:0.0001; filterBeta: 0.001"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  renderer="alpha: true; preserveDrawingBuffer: true"
>
<a-assets>
  <video id="video1" crossorigin="anonymous" autoplay loop muted playsinline webkit-playsinline preload="auto">
    <source src="images/1.mp4" type="video/mp4">
  </video>
  <video id="video5" crossorigin="anonymous" autoplay loop muted playsinline webkit-playsinline preload="auto">
    <source src="images/5.mp4" type="video/mp4">
  </video>
  <video id="video6" crossorigin="anonymous" autoplay loop muted playsinline webkit-playsinline preload="auto">
    <source src="images/6.mp4" type="video/mp4">
  </video>
</a-assets>
  <a-entity light="type: ambient; intensity: 1"></a-entity>

  <!-- ===== target 0 ===== -->
  <a-entity id="target0" mindar-image-target="targetIndex: 0">
    <a-plane
      id="videoPlane"
      material="shader: flat; src: #video1; transparent: true"
      width="1"
      height="1"
      position="0 0.05 0.05"
      scale="1.1 1.1 1"
    ></a-plane>
  </a-entity>

  <!-- ===== target 1 ===== -->
  <a-entity mindar-image-target="targetIndex: 1">
    <a-plane
      src="images/2.webp"
      width="1"
      height="1"
      position="0 0.05 0"
      rotation="20 0 0"
      scale="0.9 0.9 1"
      material="shader: flat; transparent: true"
    ></a-plane>
  </a-entity>

  <!-- ===== target 2 ===== -->
  <a-entity mindar-image-target="targetIndex: 2">
    <a-plane
      src="images/3_1.png"
      width="1"
      height="1.4"
      position="0 0.05 0"
      scale="1.15 1.15 1"
      material="shader: flat; transparent: true"
    ></a-plane>

    <!-- <a-plane
      src="images/3_2.png"
      width="1"
      height="1.4"
      position="0 0.07 0.30"
      scale="1.35 1.25 1"
      material="shader: flat; transparent: true"
    ></a-plane> -->

  </a-entity>

    <!-- ========== チェキ2（静止画表示） ========== -->
    <a-entity id="target3" mindar-image-target="targetIndex: 3">
      <a-plane
        id="staticPlaneBase"
        src="images/4.png"
        width="1"
        height="1.4"
        position="0 0.05 0"
        scale="1.35 1.25 1"
        material="shader: flat; transparent: true"
      ></a-plane>

      <a-plane
        id="staticPlane5"
        src="images/4_5_s.png"
        width="1"
        height="1.4"
        position="0 0.04 0.15"
        scale="1.5 1.35 1.1"
        material="shader: flat; transparent: true"
        animation__sway="
          property: rotation;
          dir: alternate;
          dur: 3000;
          easing: easeInOutSine;
          loop: true;
          to: 0 0 3
        "
      ></a-plane>

      <a-plane
        id="staticPlane6"
        src="images/4_6_s.png"
        width="1"
        height="1.4"
        position="0 0.07 0.16"
        scale="1.5 1.35 1.1"
        material="shader: flat; transparent: true"
        animation__sway="
          property: rotation;
          dir: alternate;
          dur: 1500;
          easing: easeInOutSine;
          loop: true;
          to: 0 0 5
        "
      ></a-plane>
      
      <a-plane
        id="staticPlane7"
        src="images/4_7_s.png"
        width="1"
        height="1.4"
        position="0 0.07 0.17"
        scale="1.5 1.35 1.1"
        material="shader: flat; transparent: true"
        
        animation__sway="
          property: rotation;
          dir: alternate;
          dur: 2000;
          easing: easeInOutSine;
          loop: true;
          to: 0 0 -4
        "
      ></a-plane>

      <a-plane
        id="effectPlane"
        src="images/4_4.png"
        width="1"
        height="1.4"
        position="0 0.07 0.30"
        scale="1.5 1.35 1.1"
        material="shader: flat; transparent: true"
        animation__fade="
          property: material.opacity;
          dir: alternate;
          dur: 1000;
          easing: easeInOutSine;
          loop: true;
          from: 0.2;
          to: 1
        "
      ></a-plane>
      
      <a-plane
        id="effectPlane2"
        src="images/4_4_.png"
        width="1"
        height="1.4"
        position="0 0.07 0.30"
        scale="1.5 1.35 1.1"
        material="shader: flat; transparent: true"
        animation__fade="
          property: material.opacity;
          dir: alternate;
          dur: 1000;
          easing: easeInOutSine;
          loop: true;
          from: 1;
          to: 0.2
        "
      ></a-plane>

      <a-plane
        id="staticPlane6"
        src="images/4_6.png"
        width="1"
        height="1.4"
        position="0 0.07 0.40"
        scale="1.5 1.35 1.1"
        material="shader: flat; transparent: true"
        animation__sway="
          property: rotation;
          dir: alternate;
          dur: 1500;
          easing: easeInOutSine;
          loop: true;
          to: 0 0 8
        "
      ></a-plane>

      <a-plane
        id="staticPlane7"
        src="images/4_7.png"
        width="1"
        height="1.4"
        position="0 0.07 0.42"
        scale="1.5 1.35 1.1"
        material="shader: flat; transparent: true"
        
        animation__sway="
          property: rotation;
          dir: alternate;
          dur: 2000;
          easing: easeInOutSine;
          loop: true;
          to: 0 0 -7
        "

      ></a-plane>

      <a-plane
        id="staticPlane5"
        src="images/4_5.png"
        width="1"
        height="1.4"
        position="0 0.07 0.50"
        scale="1.5 1.35 1.1"
        material="shader: flat; transparent: true"
        animation__sway="
          property: rotation;
          dir: alternate;
          dur: 3000;
          easing: easeInOutSine;
          loop: true;
          to: 0 0 5
        "
      ></a-plane>

    </a-entity>

    <!-- ===== target 4（動画表示） ===== -->
    <a-entity id="target4" mindar-image-target="targetIndex: 4">
      <a-plane
        id="videoPlane"
        material="shader: flat; src: #video5; transparent: true"
        width="1"
        height="1"
        position="0 0.05 0.05"
        scale="1 1 1"
      ></a-plane>
    </a-entity>
    
    <!-- ===== target 5（動画表示） ===== -->
    <a-entity id="target5" mindar-image-target="targetIndex: 5">
      <a-plane
        id="videoPlane"
        material="shader: flat; src: #video6; transparent: true"
        width="1"
        height="1"
        position="0.15 -0.1 0.05"
        scale="2.7 2.7 1"
      ></a-plane>
    </a-entity>


  <a-camera active='true' position='0 0 0'></a-camera>
</a-scene>

<button id="captureButton"></button>
<canvas id="captureCanvas" style="display:none;"></canvas>

<script>

/* ===============================
    動画再生
=============================== */
window.addEventListener("DOMContentLoaded", () => {
  // target と video の紐付けマッピング
  const videoMapping = {
    0: 'video1',
    4: 'video5',
    5: 'video6'
  };

  Object.entries(videoMapping).forEach(([targetIndex, videoId]) => {
    const target = document.querySelector(`#target${targetIndex}`);
    const video = document.querySelector(`#${videoId}`);

    if (!target || !video) return;

    target.addEventListener("targetFound", async () => {
      try {
        try { video.load(); } catch (e) {}
        await video.play();
      } catch (e) {
        console.warn(`video ${videoId} play failed:`, e);
      }
    });

    target.addEventListener("targetLost", () => {
      try {
        video.pause();
        video.currentTime = 0;
      } catch (e) {}
    });
  });
});

/* ===============================
   撮影
=============================== */
const btn = document.getElementById("captureButton");
const out = document.getElementById("captureCanvas");

btn.addEventListener("click", () => {
  const scene = document.querySelector("a-scene");
  const gl = scene.renderer.domElement;
  const video = document.querySelector("video");

  if (!video || video.videoWidth === 0) return;

  // 次の描画フレームを2回待つ
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      out.width = gl.width;
      out.height = gl.height;

      const ctx = out.getContext("2d");

      ctx.drawImage(video, 0, 0, out.width, out.height);
      ctx.drawImage(gl, 0, 0, out.width, out.height);

      // 画像名はタイムスタンプ
      file_name = `${Date.now()}.png`;

      out.toBlob(async (blob) => {
        const file = new File([blob], file_name, { type: "image/png" });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: "AR Photo" });
        } else {
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = file_name;
          a.click();
        }
      });
    });
  });
});
</script>

</body>
</html>
